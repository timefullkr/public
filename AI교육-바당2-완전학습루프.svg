<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1010 330" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;max-width:1010px;" font-family="Malgun Gothic, 맑은 고딕, sans-serif">
  <defs>
    <marker id="mlN" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3.2 L0,6.4Z" fill="#5b7fb5"/>
    </marker>
    <marker id="mlA" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3.2 L0,6.4Z" fill="#e08a1e"/>
    </marker>
    <marker id="mlT" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3.2 L0,6.4Z" fill="#2a9d8a"/>
    </marker>
  </defs>

  <!-- 배경 투명 — 상자 밖 선·라벨은 라이트/다크 겸용 중간톤 -->

  <!-- 도달 분기 (위) -->
  <line x1="370" y1="128" x2="370" y2="86" stroke="#e08a1e" stroke-width="3" marker-end="url(#mlA)"/>
  <text x="392" y="72" text-anchor="start" fill="#cf8418" font-size="17" font-weight="800">도달 → 다음 목표 · 심화</text>

  <!-- 흐름 상자 -->
  <g font-weight="700">
    <rect x="24" y="130" width="196" height="86" rx="14" fill="#fff" stroke="#a9b6cf" stroke-width="1.5"/>
    <text x="122" y="166" text-anchor="middle" fill="#1f2d4d" font-size="19">수업</text>
    <text x="122" y="192" text-anchor="middle" fill="#66768a" font-size="14">교수학습</text>
    <rect x="272" y="130" width="196" height="86" rx="14" fill="#fff" stroke="#a9b6cf" stroke-width="1.5"/>
    <text x="370" y="166" text-anchor="middle" fill="#1f2d4d" font-size="19">형성평가</text>
    <text x="370" y="192" text-anchor="middle" fill="#66768a" font-size="14">진단</text>
    <rect x="520" y="124" width="220" height="104" rx="14" fill="#eef7ee" stroke="#2e7d32" stroke-width="2"/>
    <text x="630" y="156" text-anchor="middle" fill="#1f5e26" font-size="19">맞춤 개별 학습</text>
    <text x="630" y="182" text-anchor="middle" fill="#3a6b3a" font-size="13">오개념 진단 · 최적 설명</text>
    <text x="630" y="201" text-anchor="middle" fill="#3a6b3a" font-size="13">실시간 생성 (멀티모달)</text>
    <rect x="788" y="130" width="196" height="86" rx="14" fill="#fff" stroke="#a9b6cf" stroke-width="1.5"/>
    <text x="886" y="166" text-anchor="middle" fill="#1f2d4d" font-size="17">재 형성평가 신청</text>
    <text x="886" y="192" text-anchor="middle" fill="#66768a" font-size="14">맞춤 재출제</text>
  </g>

  <!-- 좌→우 흐름 화살표 -->
  <line x1="226" y1="173" x2="264" y2="173" stroke="#5b7fb5" stroke-width="2.5" marker-end="url(#mlN)"/>
  <text x="494" y="158" text-anchor="middle" fill="#7d8ca3" font-size="13" font-weight="700">미도달</text>
  <line x1="474" y1="173" x2="512" y2="173" stroke="#5b7fb5" stroke-width="2.5" marker-end="url(#mlN)"/>
  <line x1="746" y1="173" x2="780" y2="173" stroke="#5b7fb5" stroke-width="2.5" marker-end="url(#mlN)"/>

  <!-- 미도달 루프 (아래 회귀) -->
  <path d="M880,222 C880,296 376,296 376,224" fill="none" stroke="#2a9d8a" stroke-width="2.5" marker-end="url(#mlT)"/>

  <text x="628" y="316" text-anchor="middle" fill="#2a9d8a" font-size="15" font-weight="800">미도달 루프 — 숙달할 때까지 반복</text>
</svg>
