<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 350" role="img" aria-label="접근, 활동, 전량 기록, 분석, 맞춤 환류로 이어지는 데이터 선순환" font-family="Pretendard,'Malgun Gothic',sans-serif">
  <rect width="560" height="350" fill="#0f2a44"/>
  <defs>
    <marker id="cR" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4Z" fill="#7ee0d3"/></marker>
    <marker id="cA" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4Z" fill="#f4a23b"/></marker>
  </defs>
  <text x="40" y="52" fill="#fff" font-size="17" font-weight="800">접근 → 활동 → 전량 기록 → 분석 → 환류</text>
  <g font-weight="700">
    <rect x="30" y="96" width="150" height="70" rx="12" fill="#fff"/>
    <text x="105" y="126" text-anchor="middle" fill="#0f2a44" font-size="15">활동</text>
    <text x="105" y="148" text-anchor="middle" fill="#66768a" font-size="11">AI 대화·수업·업무</text>
    <rect x="205" y="96" width="150" height="70" rx="12" fill="#fff" stroke="#f4a23b" stroke-width="3"/>
    <text x="280" y="126" text-anchor="middle" fill="#b26305" font-size="15">전량 기록</text>
    <text x="280" y="148" text-anchor="middle" fill="#66768a" font-size="11">교육청 DB — 소유</text>
    <rect x="380" y="96" width="150" height="70" rx="12" fill="#fff"/>
    <text x="455" y="126" text-anchor="middle" fill="#0f2a44" font-size="15">분석</text>
    <text x="455" y="148" text-anchor="middle" fill="#66768a" font-size="11">학습분석 · 안전</text>
  </g>
  <g stroke="#7ee0d3" stroke-width="3">
    <line x1="180" y1="131" x2="199" y2="131" marker-end="url(#cR)"/>
    <line x1="355" y1="131" x2="374" y2="131" marker-end="url(#cR)"/>
  </g>
  <path d="M455,166 C455,272 115,272 105,170" fill="none" stroke="#f4a23b" stroke-width="3" marker-end="url(#cA)"/>
  <text x="280" y="252" text-anchor="middle" fill="#f4c98a" font-size="14" font-weight="800">맞춤 데이터·콘텐츠로 되돌아온다</text>
  <text x="280" y="316" text-anchor="middle" fill="#c7d5e2" font-size="12">단순 챗봇이 아니라 데이터 선순환 — 바당2의 핵심 가치</text>
</svg>
