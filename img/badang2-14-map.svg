<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 350" role="img" aria-label="코어 게이트웨이와 공통 채팅 인터페이스 위에 수업·루프·평가·나눔·기록 모듈이 올라가고 안전·접근성·토큰은 항상 켜져 있는 기능 구성" font-family="Pretendard,'Malgun Gothic',sans-serif">
  <rect width="560" height="350" fill="#0f2a44"/>
  <text x="40" y="52" fill="#fff" font-size="17" font-weight="800">열 개의 기능이 하나의 엔진을 이룬다</text>
  <rect x="30" y="78" width="108" height="204" rx="12" fill="rgba(244,162,59,.12)" stroke="#f4a23b" stroke-width="1.6"/>
  <text x="84" y="102" text-anchor="middle" fill="#f4c98a" font-size="11" font-weight="800">항상 ON</text>
  <g font-weight="700" font-size="11" fill="#0f2a44">
    <rect x="42" y="112" width="84" height="44" rx="8" fill="#fff"/><text x="84" y="138" text-anchor="middle">5 안전</text>
    <rect x="42" y="166" width="84" height="44" rx="8" fill="#fff"/><text x="84" y="192" text-anchor="middle">6 접근성</text>
    <rect x="42" y="220" width="84" height="44" rx="8" fill="#fff"/><text x="84" y="246" text-anchor="middle">7 토큰</text>
  </g>
  <g font-weight="700" font-size="10.5" fill="#0f2a44">
    <rect x="156" y="78" width="66" height="50" rx="8" fill="#fff"/><text x="189" y="107" text-anchor="middle">1 수업</text>
    <rect x="230" y="78" width="66" height="50" rx="8" fill="#fff"/><text x="263" y="107" text-anchor="middle">3 루프</text>
    <rect x="304" y="78" width="66" height="50" rx="8" fill="#fff"/><text x="337" y="107" text-anchor="middle">8 평가</text>
    <rect x="378" y="78" width="66" height="50" rx="8" fill="#fff"/><text x="411" y="107" text-anchor="middle">9 나눔</text>
    <rect x="156" y="140" width="288" height="50" rx="8" fill="rgba(31,199,177,.16)" stroke="#1fc7b1" stroke-width="2"/>
    <text x="300" y="170" text-anchor="middle" fill="#eafffb" font-size="12.5">2 채팅 인터페이스 — 공통 토대</text>
    <rect x="156" y="202" width="288" height="50" rx="8" fill="#fff"/>
    <text x="300" y="232" text-anchor="middle" fill="#0f2a44" font-size="12.5">코어 게이트웨이 — 로깅·안전</text>
  </g>
  <rect x="458" y="78" width="72" height="174" rx="10" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.35)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="494" y="158" text-anchor="middle" fill="#e9eff6" font-size="11" font-weight="800">10 마켓</text>
  <text x="494" y="176" text-anchor="middle" fill="#9fb3c8" font-size="9.5">LTI·MCP</text>
  <text x="280" y="316" text-anchor="middle" fill="#c7d5e2" font-size="12">4 학습기록 포함 — 기능 2가 모든 기능의 공통 클라이언트</text>
</svg>
